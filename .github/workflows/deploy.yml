name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache law PDFs
        uses: actions/cache@v4
        with:
          path: /home/runner/.pdf_cache
          key: law-pdfs-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build law pages + RAG data
        env:
          PDF_CACHE_DIR: /home/runner/.pdf_cache
        run: |
          pip install pdfplumber gdown jinja2
          python build.py

      - name: Inject secrets
        run: |
          echo "const GROQ_KEY = '${{ secrets.GROQ_KEY }}';" > config.js
          echo "const LOGIN_USER = '${{ secrets.LOGIN_USER }}';" >> config.js
          echo "const LOGIN_PASS = '${{ secrets.LOGIN_PASS }}';" >> config.js
          echo "const LOGIN_USER2 = '${{ secrets.LOGIN_USER2 }}';" >> config.js
          echo "const LOGIN_PASS2 = '${{ secrets.LOGIN_PASS2 }}';" >> config.js
          echo "const LOGIN_USER3 = '${{ secrets.LOGIN_USER3 }}';" >> config.js
          echo "const LOGIN_PASS3 = '${{ secrets.LOGIN_PASS3 }}';" >> config.js

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
